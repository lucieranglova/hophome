# HopHome Configuration
# Adjust filters and scoring weights here

filters:
  max_price_aud_month: 2500
  min_bedrooms: 2
  property_types:
    - house
    - apartment
  location: "Brisbane"
  state: "QLD"

scoring:
  weights:
    price_vs_average: 20    # sníženo — beach je teď priorita
    distance_cbd: 10        # sníženo
    distance_beach: 35      # zvýšeno — chceme být blíž pláži!
    property_type: 15
    bedrooms: 20            # zvýšeno
  thresholds:
    high_score: 80
    price_drop_pct: 5

enrichment:
  show_school: true         # zobrazit vzdálenost k nejbližší škole
  show_hospital: true       # zobrazit vzdálenost k nejbližší nemocnici

references:
  brisbane_cbd:
    lat: -27.4698
    lon: 153.0251
  nearest_beach:
    lat: -27.9944
    lon: 153.4306
  suburb_avg_price_aud_week: 550

alerts:
  new_listing: true
  price_drop: true
  high_score: true
